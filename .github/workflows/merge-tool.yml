name: Merge pending tool into tools.json

on:
  push:
    paths:
      - 'pending.json'

permissions:
  contents: write

jobs:
  merge:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
        with:
          fetch-depth: 0
          token: ${{ secrets.GITHUB_TOKEN }}

      - name: Merge and prepend new tool
        run: |
          python3 - <<'EOF'
          import json, sys

          try:
            with open('pending.json') as f:
              new_tool = json.load(f)
          except Exception as e:
            print(f"Could not read pending.json: {e}")
            sys.exit(0)

          if new_tool.get('name') == 'placeholder':
            print("Placeholder file — skipping")
            sys.exit(0)

          try:
            with open('tools.json') as f:
              tools = json.load(f)
          except Exception as e:
            print(f"Could not read tools.json: {e}")
            sys.exit(1)

          existing_domains = [t.get('domain','') for t in tools]
          if new_tool.get('domain','') in existing_domains:
            print(f"Duplicate — skipping: {new_tool.get('domain')}")
            sys.exit(0)

          new_tool['id'] = len(tools) + 1
          tools.insert(0, new_tool)

          with open('tools.json', 'w') as f:
            json.dump(tools, f, indent=2)

          print(f"SUCCESS — added: {new_tool.get('name')}")
          EOF

      - name: Commit and push
        run: |
          git config user.name "AI Disco Bot"
          git config user.email "actions@github.com"
          git add tools.json
          if git diff --staged --quiet; then
            echo "No changes to commit"
          else
            git commit -m "Auto-added: $(python3 -c "import json; d=json.load(open('pending.json')); print(d.get('name','new tool'))")"
            git push
          fi

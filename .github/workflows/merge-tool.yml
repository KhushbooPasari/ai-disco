name: Merge pending tool into tools.json

on:
  push:
    paths:
      - 'pending.json'

jobs:
  merge:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
        with:
          token: ${{ secrets.GITHUB_TOKEN }}

      - name: Merge and prepend new tool
        run: |
          python3 - <<'EOF'
          import json

          with open('pending.json') as f:
            new_tool = json.load(f)

          with open('tools.json') as f:
            tools = json.load(f)

          # Avoid duplicates
          existing_domains = [t.get('domain','') for t in tools]
          if new_tool.get('domain','') not in existing_domains:
            new_tool['id'] = len(tools) + 1
            tools.insert(0, new_tool)
            with open('tools.json', 'w') as f:
              json.dump(tools, f, indent=2)
            print(f"Added: {new_tool.get('name')}")
          else:
            print(f"Skipped duplicate: {new_tool.get('domain')}")
          EOF

      - name: Commit updated tools.json
        run: |
          git config user.name "AI Disco Bot"
          git config user.email "bot@aidisco.com"
          git add tools.json
          git diff --staged --quiet || git commit -m "Auto: added $(python3 -c "import json; print(json.load(open('pending.json')).get('name','new tool'))")"
          git push
```

Click **Commit new file**

